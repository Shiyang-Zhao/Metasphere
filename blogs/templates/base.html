{% load static %}
<!doctype html>
<html lang="en">

<head>

  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
  <link rel="stylesheet" href="{% static 'base.css' %}">
  <title>Metasphere</title>

</head>

<body>
  <div class="background-container">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <a class="navbar-brand font-weight-bold" href="{% url 'blog-home' %}"><i class="fas fa-home"></i>
        Metasphere</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <!------{{ request.get_host }}/blog/search/-->
        <div class="navbar-nav ms-auto">
          <form id="searchform" action="{% url 'search' %}" method="get">
            <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search Here..." />
            <button type="button" onclick="searchform.submit()" class=" text-white my-color btn-primary">
              <i class="fa fa-search"></i></button>
          </form>
        </div>
        {% if user.is_authenticated %}
        <a href="{% url 'chat-room-list' %}" class="btn text-white m-2"><i class="fas fa-comments"></i> Chat</a>
        <a href="{% url 'user-posts' request.user.username %}" class="btn text-white m-2">
          <i class="fas fa-user-shield"></i> My Post</a>
        <a href="{% url 'post-create' %}" class="btn text-white m-2"><i class="fas fa-user-edit"></i> New Post</a>
        <a href="{% url 'profile' request.user.username %}" class="btn text-white m-2">
          <i class="fas fa-user"></i>
          {{ request.user.username }}
        </a>
        <a href="{% url 'logout' %}" class="btn text-white m-2"><i class="fas fa-sign-out-alt"></i> Log Out</a>

        {% else %}
        <a href="{% url 'login' %} " class="btn text-white m-2"><i class="fas fa-user-tie"></i> Log In</a>

        <a href="{% url 'register' %} " class="btn text-white m-2"> <i class="fas fa-sign-in-alt"></i> Sign Up</a>
        {% endif %}

      </div>
    </nav>
    <div class="container my-bg">
      {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}
      {% block content %}

      {% endblock %}
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"></script>
    <script src="{% static 'base.js' %}"></script>
  </div>
</body>

</html>
